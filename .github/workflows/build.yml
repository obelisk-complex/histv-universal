name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - os: macos-14
            target: x86_64-apple-darwin
            label: macos-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.label == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Find bundle outputs
        shell: bash
        run: |
          echo "=== All bundle files ==="
          find src-tauri/target -path "*/bundle/*" -type f 2>/dev/null || echo "No bundle directory found"
          echo "=== Looking for installers ==="
          find src-tauri/target -type f \( -name "*.msi" -o -name "*.exe" -o -name "*.deb" -o -name "*.AppImage" -o -name "*.dmg" \) 2>/dev/null || echo "None found"

      - name: Collect artefacts
        shell: bash
        run: |
          mkdir -p artefacts
          find src-tauri/target -path "*/bundle/*" -type f \( -name "*.msi" -o -name "*.deb" -o -name "*.AppImage" -o -name "*.dmg" \) -exec cp {} artefacts/ \;
          find src-tauri/target -path "*/bundle/nsis/*" -name "*.exe" -exec cp {} artefacts/ \;
          ls -lh artefacts/

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: histv-${{ matrix.label }}
          path: artefacts/*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artefacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List assets
        run: find release-assets -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
          generate_release_notes: true
          draft: false
          prerelease: false