# Reusable workflow: build a single platform (GUI + CLI + full bundles)
name: Build Platform

on:
  workflow_call:
    inputs:
      os:
        description: "Runner OS (e.g. ubuntu-22.04)"
        required: true
        type: string
      target:
        description: "Rust target triple"
        required: true
        type: string
      label:
        description: "Platform label (linux, windows, macos-arm64, macos-x64)"
        required: true
        type: string
      bundles:
        description: "Tauri bundle type (e.g. appimage, dmg)"
        required: false
        type: string
        default: ""
      ref:
        description: "Git ref to build"
        required: false
        type: string
        default: "main"

permissions:
  contents: read

# ── Pinned dependency versions ──────────────────────────────────
env:
  RUST_VERSION: "1.93.1"
  TAURI_CLI_VERSION: "=2.10.1"
  FFMPEG_BTBN_TAG: "autobuild-2026-04-01-13-13"
  FFMPEG_BTBN_LINUX: "ffmpeg-n8.1-7-ga3475e2554-linux64-gpl-8.1.tar.xz"
  FFMPEG_BTBN_LINUX_SHA256: "57417a11d21fc9ec76b4a250f95754d99d0f272765ba62b2d0aaf87d02c32cd8"
  FFMPEG_GYAN_VERSION: "8.0.1"
  FFMPEG_GYAN_SHA256: "42edab4b9241ff1184b26d5f4545322227589713a7e56cf4459c4c4e30ccaaac"
  FFMPEG_EVERMEET_VER: "8.1"
  FFMPEG_EVERMEET_SHA256: "d67db25908eff64b7d0eaa73784f0c55728d9e036a96931095fcf8e8968eefab"
  FFPROBE_EVERMEET_SHA256: "b6e9bf4f4ab2992dace205498d99d9e2ede684e3e8ae89485cadd3b91711ea04"
  APPIMAGETOOL_VERSION: "1.9.1"
  APPIMAGETOOL_SHA256: "ed4ce84f0d9caff66f50bcca6ff6f35aae54ce8135408b3fa33abfc3cb384eb0"

jobs:
  build:
    runs-on: ${{ inputs.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}

      - name: Install Rust ${{ env.RUST_VERSION }}
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # 2026-03-27
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ inputs.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: inputs.label == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Cache Tauri CLI binary
        id: cache-tauri-cli
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cargo/bin/cargo-tauri
          key: tauri-cli-${{ env.TAURI_CLI_VERSION }}-${{ runner.os }}

      - name: Install Tauri CLI
        if: steps.cache-tauri-cli.outputs.cache-hit != 'true'
        run: cargo install tauri-cli --version "${{ env.TAURI_CLI_VERSION }}" --locked

      - name: Run tests
        working-directory: src-tauri
        run: cargo test --features dovi,cli --target ${{ inputs.target }}

      - name: Build GUI
        shell: bash
        run: |
          set -e
          BUNDLES="${{ inputs.bundles }}"
          TARGET="${{ inputs.target }}"
          if [ -n "$BUNDLES" ]; then
            cargo tauri build --target "$TARGET" --bundles "$BUNDLES"
          else
            cargo tauri build --target "$TARGET"
          fi

      - name: Build CLI
        working-directory: src-tauri
        shell: bash
        run: |
          set -e
          cargo build --release --bin histv-cli --no-default-features --features cli --target "${{ inputs.target }}"

      - name: Collect artefacts
        shell: bash
        run: |
          set -e
          mkdir -p artefacts
          TARGET="${{ inputs.target }}"
          LABEL="${{ inputs.label }}"

          # Portable Windows exe (GUI)
          PORTABLE="$GITHUB_WORKSPACE/src-tauri/target/$TARGET/release/histv.exe"
          if [ -f "$PORTABLE" ]; then
            cp "$PORTABLE" "artefacts/histv-$LABEL.exe"
          fi

          # AppImage (Linux portable GUI)
          find "$GITHUB_WORKSPACE" -name "*.AppImage" -exec cp {} artefacts/ \;

          # DMG (macOS portable GUI)
          find "$GITHUB_WORKSPACE" -name "*.dmg" -exec cp {} artefacts/ \;

          # CLI binary
          case "$LABEL" in
            windows)
              CLI_SRC="$GITHUB_WORKSPACE/src-tauri/target/$TARGET/release/histv-cli.exe"
              CLI_DEST="artefacts/histv-cli-windows.exe"
              ;;
            linux)
              CLI_SRC="$GITHUB_WORKSPACE/src-tauri/target/$TARGET/release/histv-cli"
              CLI_DEST="artefacts/histv-cli-linux"
              ;;
            macos-*)
              CLI_SRC="$GITHUB_WORKSPACE/src-tauri/target/$TARGET/release/histv-cli"
              CLI_DEST="artefacts/histv-cli-$LABEL"
              ;;
          esac

          if [ -f "$CLI_SRC" ]; then
            cp "$CLI_SRC" "$CLI_DEST"
          fi

          ls -lh artefacts/

      # ── Download ffmpeg for -full variant builds ───────────────

      - name: Download ffmpeg
        shell: bash
        run: |
          set -e
          mkdir -p ffmpeg-bin
          LABEL="${{ inputs.label }}"

          case "$LABEL" in
            windows)
              URL="https://www.gyan.dev/ffmpeg/builds/packages/ffmpeg-${FFMPEG_GYAN_VERSION}-full_build.7z"
              echo "Downloading ffmpeg from $URL"
              curl -fSL --retry 3 -o ffmpeg-archive.7z "$URL"
              echo "${FFMPEG_GYAN_SHA256}  ffmpeg-archive.7z" | sha256sum -c -
              7z x ffmpeg-archive.7z -offmpeg-extract -y
              FFMPEG=$(find ffmpeg-extract -name "ffmpeg.exe" -type f | head -1)
              FFPROBE=$(find ffmpeg-extract -name "ffprobe.exe" -type f | head -1)
              cp "$FFMPEG" ffmpeg-bin/ffmpeg.exe
              cp "$FFPROBE" ffmpeg-bin/ffprobe.exe
              ;;
            linux)
              URL="https://github.com/BtbN/FFmpeg-Builds/releases/download/${FFMPEG_BTBN_TAG}/${FFMPEG_BTBN_LINUX}"
              echo "Downloading ffmpeg from $URL"
              curl -fSL --retry 3 -o ffmpeg-archive.tar.xz "$URL"
              echo "${FFMPEG_BTBN_LINUX_SHA256}  ffmpeg-archive.tar.xz" | sha256sum -c -
              mkdir -p ffmpeg-extract
              tar xf ffmpeg-archive.tar.xz -C ffmpeg-extract
              FFMPEG=$(find ffmpeg-extract -name "ffmpeg" -not -name "ffprobe" -type f | head -1)
              FFPROBE=$(find ffmpeg-extract -name "ffprobe" -type f | head -1)
              cp "$FFMPEG" ffmpeg-bin/ffmpeg
              cp "$FFPROBE" ffmpeg-bin/ffprobe
              chmod +x ffmpeg-bin/ffmpeg ffmpeg-bin/ffprobe
              ;;
            macos-*)
              echo "Downloading ffmpeg ${FFMPEG_EVERMEET_VER} from evermeet.cx"
              curl -fSL --retry 3 -o ffmpeg.zip "https://evermeet.cx/ffmpeg/ffmpeg-${FFMPEG_EVERMEET_VER}.zip"
              curl -fSL --retry 3 -o ffprobe.zip "https://evermeet.cx/ffmpeg/ffprobe-${FFMPEG_EVERMEET_VER}.zip"
              echo "${FFMPEG_EVERMEET_SHA256}  ffmpeg.zip" | shasum -a 256 -c -
              echo "${FFPROBE_EVERMEET_SHA256}  ffprobe.zip" | shasum -a 256 -c -
              unzip -q ffmpeg.zip -d ffmpeg-bin
              unzip -q ffprobe.zip -d ffmpeg-bin
              chmod +x ffmpeg-bin/ffmpeg ffmpeg-bin/ffprobe
              ;;
          esac

          echo "--- ffmpeg-bin contents ---"
          ls -lh ffmpeg-bin/

      # ── Build -full variant bundles ────────────────────────────

      - name: Bundle full (Windows)
        if: inputs.label == 'windows'
        shell: bash
        run: |
          set -e
          # GUI full - zip with ffmpeg
          mkdir -p bundle-gui
          cp "artefacts/histv-windows.exe" bundle-gui/
          cp ffmpeg-bin/ffmpeg.exe bundle-gui/
          cp ffmpeg-bin/ffprobe.exe bundle-gui/
          cp THIRD-PARTY-LICENCES bundle-gui/
          cd bundle-gui && 7z a -tzip -mx=9 ../artefacts/histv-windows-full.zip * && cd ..

          # CLI full - zip with ffmpeg
          mkdir -p bundle-cli
          cp "artefacts/histv-cli-windows.exe" bundle-cli/
          cp ffmpeg-bin/ffmpeg.exe bundle-cli/
          cp ffmpeg-bin/ffprobe.exe bundle-cli/
          cp THIRD-PARTY-LICENCES bundle-cli/
          cd bundle-cli && 7z a -tzip -mx=9 ../artefacts/histv-cli-windows-full.zip * && cd ..

      - name: Bundle full (Linux)
        if: inputs.label == 'linux'
        shell: bash
        run: |
          set -e
          # GUI full - repack the AppImage with ffmpeg inside
          APPIMAGE=$(find artefacts -name "*.AppImage" | head -1)
          chmod +x "$APPIMAGE"
          "$APPIMAGE" --appimage-extract

          cp ffmpeg-bin/ffmpeg squashfs-root/usr/bin/
          cp ffmpeg-bin/ffprobe squashfs-root/usr/bin/
          cp THIRD-PARTY-LICENCES squashfs-root/

          # Get appimagetool to repack (pinned version)
          APPIMAGETOOL_URL="https://github.com/AppImage/appimagetool/releases/download/${APPIMAGETOOL_VERSION}/appimagetool-x86_64.AppImage"
          curl -fSL --retry 3 -o appimagetool "$APPIMAGETOOL_URL"
          echo "${APPIMAGETOOL_SHA256}  appimagetool" | sha256sum -c -
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run squashfs-root/ artefacts/histv-linux-full.AppImage

          # CLI full - tar.gz with ffmpeg
          mkdir -p bundle-cli
          cp "artefacts/histv-cli-linux" bundle-cli/
          cp ffmpeg-bin/ffmpeg bundle-cli/
          cp ffmpeg-bin/ffprobe bundle-cli/
          cp THIRD-PARTY-LICENCES bundle-cli/
          tar czf artefacts/histv-cli-linux-full.tar.gz -C bundle-cli .

      - name: Bundle full (macOS)
        if: startsWith(inputs.label, 'macos')
        shell: bash
        run: |
          set -e
          LABEL="${{ inputs.label }}"

          # GUI full - extract DMG, inject ffmpeg, create new DMG
          DMG=$(find artefacts -name "*.dmg" | head -1)

          # hdiutil can be flaky in CI; retry up to 3 times
          for i in 1 2 3; do
            hdiutil attach "$DMG" -mountpoint /tmp/dmg_src -nobrowse -readonly && break
            echo "hdiutil attach failed, retrying in 5s..."
            sleep 5
          done

          mkdir -p dmg-contents
          cp -R /tmp/dmg_src/* dmg-contents/
          hdiutil detach /tmp/dmg_src

          APP=$(find dmg-contents -maxdepth 1 -name "*.app" | head -1)
          cp ffmpeg-bin/ffmpeg "$APP/Contents/MacOS/"
          cp ffmpeg-bin/ffprobe "$APP/Contents/MacOS/"
          mkdir -p "$APP/Contents/Resources"
          cp THIRD-PARTY-LICENCES "$APP/Contents/Resources/"

          hdiutil create \
            -srcfolder dmg-contents \
            -format UDZO \
            -ov \
            "artefacts/histv-$LABEL-full.dmg"

          rm -rf dmg-contents

          # CLI full - tar.gz with ffmpeg
          mkdir -p bundle-cli
          cp "artefacts/histv-cli-$LABEL" bundle-cli/
          cp ffmpeg-bin/ffmpeg bundle-cli/
          cp ffmpeg-bin/ffprobe bundle-cli/
          cp THIRD-PARTY-LICENCES bundle-cli/
          tar czf "artefacts/histv-cli-$LABEL-full.tar.gz" -C bundle-cli .

      - name: Upload artefacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: histv-${{ inputs.label }}
          path: artefacts/*
