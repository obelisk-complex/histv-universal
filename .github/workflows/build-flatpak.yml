# Build a Flathub-grade Flatpak from source using the real manifest
name: Build Flatpak

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch, tag, or SHA)"
        required: false
        default: "main"

permissions:
  contents: read

env:
  GNOME_RUNTIME_VERSION: "50"
  RUST_EXT_VERSION: "25.08"

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Cache Flatpak SDK
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: /var/lib/flatpak
          key: flatpak-sdk-gnome-${{ env.GNOME_RUNTIME_VERSION }}-rust-${{ env.RUST_EXT_VERSION }}

      - name: Install Flatpak and flatpak-builder
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder

      - name: Add Flathub remote
        run: |
          set -e
          sudo flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Install GNOME SDK, Platform, and Rust extension
        run: |
          set -e
          sudo flatpak install -y flathub \
            org.gnome.Platform//${{ env.GNOME_RUNTIME_VERSION }} \
            org.gnome.Sdk//${{ env.GNOME_RUNTIME_VERSION }} \
            org.freedesktop.Sdk.Extension.rust-stable//${{ env.RUST_EXT_VERSION }}

      - name: Build Flatpak from source manifest
        run: |
          set -e
          flatpak-builder --force-clean --repo=flatpak-repo flatpak-build com.histv.encoder.yml

      - name: Export Flatpak bundle
        run: |
          set -e
          flatpak build-bundle flatpak-repo histv-linux.flatpak com.histv.encoder

      - name: Upload artefact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: histv-linux-flatpak
          path: histv-linux.flatpak
          retention-days: 14
