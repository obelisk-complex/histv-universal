# Release: build all platforms and upload assets to the GitHub Release
name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux
            bundles: appimage
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            label: windows
            bundles: ""
          - os: macos-14
            target: aarch64-apple-darwin
            label: macos-arm64
            bundles: dmg
          - os: macos-14
            target: x86_64-apple-darwin
            label: macos-x64
            bundles: dmg

    uses: ./.github/workflows/build-platform.yml
    with:
      os: ${{ matrix.os }}
      target: ${{ matrix.target }}
      label: ${{ matrix.label }}
      bundles: ${{ matrix.bundles }}
      ref: ${{ github.ref }}

  release:
    needs: build
    runs-on: ubuntu-22.04

    steps:
      - name: Download all artefacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: release-assets
          merge-multiple: true

      - name: List assets
        run: find release-assets -type f

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.2.2
        with:
          files: release-assets/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
