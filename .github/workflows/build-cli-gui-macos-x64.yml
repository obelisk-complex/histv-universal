name: Build macOS x64 CLI + GUI

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (branch, tag, or SHA)'
        required: false
        default: 'main'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # 1.93.1
        with:
          toolchain: "1.93.1"
          targets: x86_64-apple-darwin

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "=2.10.1" --locked

      - name: Build GUI
        run: cargo tauri build --target x86_64-apple-darwin --bundles dmg

      - name: Build CLI
        working-directory: src-tauri
        run: cargo build --release --bin histv-cli --no-default-features --features cli --target x86_64-apple-darwin

      - name: Collect artefacts
        shell: bash
        run: |
          mkdir -p artefacts
          find "$GITHUB_WORKSPACE" -name "*.dmg" -exec cp {} artefacts/ \;
          CLI_BIN="$GITHUB_WORKSPACE/src-tauri/target/x86_64-apple-darwin/release/histv-cli"
          if [ -f "$CLI_BIN" ]; then
            cp "$CLI_BIN" "artefacts/histv-cli-macos-x64"
          fi
          ls -lh artefacts/

      - name: Upload artefacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: histv-macos-x64-patch
          path: artefacts/*
          retention-days: 14
