name: Build Linux CLI + GUI

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (branch, tag, or SHA)'
        required: false
        default: 'main'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@1.93.1
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build GUI
        run: cargo tauri build --target x86_64-unknown-linux-gnu --bundles appimage

      - name: Build CLI
        working-directory: src-tauri
        run: cargo build --release --bin histv-cli --no-default-features --features cli --target x86_64-unknown-linux-gnu

      - name: Collect artefacts
        shell: bash
        run: |
          mkdir -p artefacts
          find "$GITHUB_WORKSPACE" -name "*.AppImage" -exec cp {} artefacts/ \;
          CLI_BIN="$GITHUB_WORKSPACE/src-tauri/target/x86_64-unknown-linux-gnu/release/histv-cli"
          if [ -f "$CLI_BIN" ]; then
            cp "$CLI_BIN" "artefacts/histv-cli-linux"
          fi
          ls -lh artefacts/

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: histv-linux-patch
          path: artefacts/*
          retention-days: 14
